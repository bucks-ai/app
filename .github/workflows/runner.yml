name: Runner CI

on:
  push:
    branches: [main]
    paths:
      - "runner/**"
      - ".github/workflows/runner.yml"
  pull_request:
    branches: [main]

jobs:
  pytest:
    name: Runner tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: runner/langgraph
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: runner/langgraph/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -x -q

      - name: Dry-run graph topology (no side effects)
        run: python main.py dry-run --tasks 2
